            </form>
            <div className="flex items-center gap-4 my-8">
                <div className="flex-1 h-px bg-outline-variant"></div>
                <span className="font-body-sm text-on-surface-variant">Or continue with</span>
                <div className="flex-1 h-px bg-outline-variant"></div>
            </div>
            <div className="flex flex-col gap-4 mb-8">
                {['Google', 'Apple', 'Microsoft'].map(brand => (
                    <button key={brand} className="w-full flex items-center justify-center gap-3 border-1.5 border-outline-variant rounded-xl py-3 font-semibold hover:bg-surface-container-low transition-colors">
                        <span className="material-symbols-outlined">{brand === 'Google' ? 'g_mobiledata' : brand === 'Apple' ? 'apps' : 'window'}</span>
                        Continue with {brand}
                    </button>
                ))}
            </div>
            <p className="text-center font-body-sm text-on-surface-variant mb-8">
                Don't have an account? <a href="#" className="text-primary font-semibold hover:underline">Sign Up</a>
            </p>
        </main>
    </div>
);
};

// --- App Layout ---

const App = () => {
return (
    <MemoryRouter>
        <Routes>
            <Route path="/login" element={<LoginPage />} />
            <Route path="/" element={<HomePage />} />
            <Route path="/services" element={<ServicesPage />} />
            <Route path="/service/:id" element={<ServiceDetailPage />} />
            <Route path="/messages" element={<MessagesPage />} />
            <Route path="/bookings" element={<BookingsPage />} />
            <Route path="/profile" element={<ProfilePage />} />
        </Routes>
    </MemoryRouter>
);
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
