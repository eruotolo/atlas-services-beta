networks:
  networkAtlasServices:
    driver: bridge

services:
  postgres:
    image: "postgres:16-alpine"
    container_name: postgres-atlasservices
    ports:
      - "5432:5432"
    volumes:
      - "./postgres-data/pgdata:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER=eruotolo
      - POSTGRES_PASSWORD=REDACTED
      - POSTGRES_DB=db_atlasservices
    networks:
      - networkAtlasServices

  adminer:
    image: "adminer:latest"
    container_name: adminer-atlasservices
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - networkAtlasServices
