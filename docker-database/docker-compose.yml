networks:
  networkHireeo:
    driver: bridge

services:
  postgres:
    image: "postgres:16-alpine"
    container_name: postgres-hireeo
    ports:
      - "5433:5432"
    volumes:
      - "./postgres-data/pgdata:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER=eruotolo
      - POSTGRES_PASSWORD=REDACTED
      - POSTGRES_DB=db_hireeo
    networks:
      - networkHireeo

  adminer:
    image: "adminer:latest"
    container_name: adminer-hireeo
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - networkHireeo
